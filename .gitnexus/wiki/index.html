*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--sidebar-bg:#f8f9fb;--border:#e5e7eb;
  --text:#1e293b;--text-muted:#64748b;--primary:#2563eb;
  --primary-soft:#eff6ff;--hover:#f1f5f9;--code-bg:#f1f5f9;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  line-height:1.65;color:var(--text);background:var(--bg)}

.layout{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;padding:24px 16px;
  display:flex;flex-direction:column;z-index:10}
.content{margin-left:280px;flex:1;padding:48px 64px;max-width:960px}

.sidebar-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sidebar-title svg{flex-shrink:0}
.sidebar-meta{font-size:11px;color:var(--text-muted);margin-top:6px}
.nav-section{margin-bottom:2px}
.nav-item{display:block;padding:7px 12px;border-radius:var(--radius);cursor:pointer;
  font-size:13px;color:var(--text);text-decoration:none;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.nav-item.overview{font-weight:600;margin-bottom:4px}
.nav-children{padding-left:14px;border-left:1px solid var(--border);margin-left:12px}
.nav-group-label{font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.5px;padding:12px 12px 4px;user-select:none}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-muted);text-align:center}

.content h1{font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.3}
.content h2{font-size:22px;font-weight:600;margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.content h3{font-size:17px;font-weight:600;margin:24px 0 8px}
.content h4{font-size:15px;font-weight:600;margin:20px 0 6px}
.content p{margin:12px 0}
.content ul,.content ol{margin:12px 0 12px 24px}
.content li{margin:4px 0}
.content a{color:var(--primary);text-decoration:none}
.content a:hover{text-decoration:underline}
.content blockquote{border-left:3px solid var(--primary);padding:8px 16px;margin:16px 0;
  background:var(--primary-soft);border-radius:0 var(--radius) var(--radius) 0;
  color:var(--text-muted);font-size:14px}
.content code{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:13px;
  background:var(--code-bg);padding:2px 6px;border-radius:4px}
.content pre{background:#1e293b;color:#e2e8f0;border-radius:var(--radius);padding:16px;
  overflow-x:auto;margin:16px 0}
.content pre code{background:none;padding:0;font-size:13px;line-height:1.6;color:inherit}
.content table{border-collapse:collapse;width:100%;margin:16px 0}
.content th,.content td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:14px}
.content th{background:var(--sidebar-bg);font-weight:600}
.content img{max-width:100%;border-radius:var(--radius)}
.content hr{border:none;border-top:1px solid var(--border);margin:32px 0}
.content .mermaid{margin:20px 0;text-align:center}

.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:20;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 12px;cursor:pointer;font-size:18px;box-shadow:var(--shadow)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0);box-shadow:2px 0 12px rgba(0,0,0,.1)}
  .content{margin-left:0;padding:24px 20px;padding-top:56px}
  .menu-toggle{display:block}
}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty-state h2{font-size:20px;margin-bottom:8px;border:none}

var PAGES = {"authentication-authorization":"# Authentication & Authorization\n\n# Authentication & Authorization\n\nThe Authentication & Authorization module provides a secure, role-based identity system using Firebase Authentication combined with Next.js server-side middleware. It handles user registration, login, password recovery, session management, and Role-Based Access Control (RBAC) across the application.\n\n## Architecture Overview\n\nThe system bridges client-side Firebase authentication with server-side Next.js route protection. Because Next.js middleware cannot directly access client-side Firebase states, the module synchronizes authentication state into HTTP-only compatible cookies (`aei-auth` and `aei-role`).\n\n```mermaid\ngraph TD\n    A[Client: Login/Signup] -->|signInWithFirebase| B(Firebase Auth)\n    B -->|setRoleSession| C[(Browser Cookies)]\n    C -->|aei-auth & aei-role| D[Next.js Middleware]\n    D -->|getRouteConfig| E{Authorized?}\n    E -->|Yes| F[Render Page]\n    E -->|No| G[Redirect to Role Home / Login]\n```\n\n## Key Components\n\n### 1. Client-Side Authentication (`src/lib/auth-client.ts`)\nThis file wraps Firebase Auth methods and manages the synchronization between Firebase and browser cookies.\n*   **`signInWithFirebase` & `signUpWithFirebase`**: Authenticates the user via Firebase and immediately calls `setRoleSession` to establish the server-side session. It also normalizes custom claims via `normalizeClaimRole` to ensure the role matches the `AppRole` type (`STUDENT`, `TEACHER`, `PARENT`).\n*   **`setRoleSession`**: Writes the `AUTH_COOKIE` (`aei-auth`) and `ROLE_COOKIE` (`aei-role`) to the browser.\n*   **`getCurrentIdToken`**: Retrieves the current Firebase JWT. This is heavily utilized by the backend client (`buildHeaders`) to authenticate outgoing API requests (e.g., to billing endpoints).\n*   **`signOutFromFirebase`**: Clears both the Firebase session and the local authentication cookies via `clearAuthCookies`.\n\n### 2. Route Authorization (`src/lib/route-auth.ts`)\nHandles the logic for determining if a user can access a specific path based on their role.\n*   **`getRouteConfig`**: Looks up a normalized path against the central `appRoutes` configuration.\n*   **`isRoleAllowedForPath`**: Evaluates if a given `AppRole` is permitted to access a route. If a route has no specific `roles` defined, it defaults to allowing access.\n\n### 3. Next.js Middleware (`src/middleware.ts`)\nThe middleware intercepts all incoming requests (excluding static assets and APIs) to enforce security rules before rendering.\n*   Reads `AUTH_COOKIE` and `ROLE_COOKIE`.\n*   Redirects authenticated users away from auth pages (`/login`, `/auth/signup`, `/auth/forgot-password`) to their respective dashboards using `getRoleHome`.\n*   Redirects unauthenticated users attempting to access protected routes (`requireAuth: true`) to `/login`, appending a `?next=` parameter for post-login redirection.\n*   Enforces RBAC: If an authenticated user attempts to access a route restricted to a different role, they are redirected to their role's home page with a `?denied=` parameter.\n\n### 4. React Hooks (`src/hooks/useAuthUser.ts`)\n*   **`useAuthUser`**: A client-side hook that subscribes to Firebase's `onAuthStateChanged`. It provides `{ user, loading, error }` to components that need real-time user data. It is widely used across settings, support, and billing pages to verify active client sessions.\n\n## User Interfaces\n\nThe module provides three primary entry points under `src/app/`:\n\n*   **Login (`/login`)**: Captures email, password, and an expected role. On successful authentication, it uses `resolveDestination` to route the user. `resolveDestination` checks for a `?next=` parameter, validates it against `isRoleAllowedForPath`, and falls back to `getRoleHome` if the requested path is unauthorized or missing.\n*   **Signup (`/auth/signup`)**: Allows users to create an account, explicitly selecting their `AppRole`. It enforces an 8-character password minimum and policy acceptance before calling `signUpWithFirebase`.\n*   **Forgot Password (`/auth/forgot-password`)**: A simple interface that triggers `sendResetEmail` via Firebase.\n\n## Execution Flows\n\n### Authentication to Backend API Flow\nWhen the application needs to communicate with secure backend services (like the Billing API), the auth module provides the necessary tokens:\n1. A protected page (e.g., `BillingCheckoutPage`) initiates an action.\n2. The API client calls `buildHeaders` (`src/lib/backend-client.ts`).\n3. `buildHeaders` invokes `getCurrentIdToken(false)` from `src/lib/auth-client.ts`.\n4. The Firebase JWT is attached as a Bearer token to the outgoing request.\n\n### Login Redirection Flow\n1. User submits credentials on `/login`.\n2. `handleSignIn` calls `signInWithFirebase`.\n3. `signInWithFirebase` validates credentials, extracts the role from Firebase claims (falling back to the UI-selected role if necessary), and sets cookies.\n4. `resolveDestination` normalizes the target path using `normalizePath`.\n5. `isRoleAllowedForPath` checks if the resolved role can access the target path.\n6. The router pushes the user to the validated destination.","backend-infrastructure":"# Backend & Infrastructure\n\n# Backend & Infrastructure\n\nThe Backend & Infrastructure module provides the foundational utilities for external communication in the application. It handles authenticated HTTP requests to the backend API, initializes Firebase services, and provides structured mock data for UI development and testing.\n\n## Core Components\n\n### Backend Client (`src/lib/backend-client.ts`)\n\nThe backend client is a robust wrapper around the native `fetch` API, designed to standardize API interactions, handle timeouts, and automatically inject Firebase authentication tokens.\n\n**Key Functions:**\n*   **`backendRequest<T>(path, options)`**: The core request handler. It manages the `AbortController` for timeouts (defaulting to 15,000ms), constructs headers, and parses the response. It automatically handles `204 No Content` responses and parses others as JSON.\n*   **`backendGet<T>(path, options)`**: Convenience wrapper for `GET` requests.\n*   **`backendPost<T>(path, body, options)`**: Convenience wrapper for `POST` requests. Automatically stringifies the `body` payload.\n\n**Authentication Injection:**\nBy default, all requests expect an authenticated user. The `buildHeaders` function intercepts the request and calls `getCurrentIdToken()` (from `src/lib/auth-client.ts`). If a token is found, it is attached as a `Bearer` token in the `Authorization` header. \n*To bypass this for public endpoints, developers must explicitly pass `requireAuth: false` in the `BackendRequestOptions`.*\n\n**Configuration:**\nThe client relies on the `NEXT_PUBLIC_API_BASE_URL` environment variable. The `getBackendBaseUrl()` function ensures this is present and formats it correctly (stripping trailing slashes) before appending the request path.\n\n### Firebase Client (`src/lib/firebase-client.ts`)\n\nThis file manages the singleton initialization of the Firebase SDK, ensuring it plays nicely with Next.js hot-reloading and environment configurations.\n\n*   **Initialization Logic**: It validates the presence of all required `NEXT_PUBLIC_FIREBASE_*` environment variables via the `isFirebaseConfigured` boolean. \n*   **App Instantiation**: If configured, it checks `getApps().length` to either retrieve the existing instance or initialize a new one using `initializeApp()`.\n*   **Exports**: Exposes `db` (Firestore) and `firebaseAuth` (Firebase Auth). Note that these exports will be `null` if the environment variables are missing, which prevents the app from crashing during build steps or in environments where Firebase is intentionally disabled.\n\n### Mock Data (`src/lib/mock-data.ts`)\n\nProvides static, typed datasets used for prototyping UI components without requiring a live backend connection. \n\n*   **Types**: `SubjectMetric`, `InterventionItem`, `ParentNotification`.\n*   **Datasets**: \n    *   `studentSubjectMetrics`: Mastery scores for various subjects.\n    *   `teacherInterventions`: Actionable alerts for teachers regarding student progress.\n    *   `parentNotifications`: Status updates and achievements for the parent dashboard.\n    *   `parentTrend`: Weekly score progressions.\n\n## Request Execution Flow\n\nThe backend client is heavily utilized by feature-specific APIs (such as the Billing API). When a user interacts with a feature that requires backend data, the request flows through the client to ensure authentication and configuration are applied uniformly.\n\n```mermaid\ngraph TD\n    A[Feature API<br/>e.g., billing-api.ts] -->|Calls| B(backendGet / backendPost)\n    B --> C{backendRequest}\n    C -->|1. Validates URL| D[getBackendBaseUrl]\n    C -->|2. Prepares Headers| E[buildHeaders]\n    E -->|Fetches Token| F[getCurrentIdToken]\n    F -.->|Returns JWT| E\n    C -->|3. Executes Fetch| G((Backend API))\n```\n\n### Example Flow: Billing Checkout\nAs seen in the execution graph, when a user completes a checkout session:\n1. `BillingCheckoutPage` triggers `completeBillingCheckoutSession` in `src/lib/billing-api.ts`.\n2. The Billing API calls `backendPost(\"/billing/checkout/complete\", ...)`.\n3. `backendRequest` initializes a 15-second timeout.\n4. `buildHeaders` requests the current Firebase JWT via `getCurrentIdToken`.\n5. The fully authenticated request is dispatched to the backend URL defined in `NEXT_PUBLIC_API_BASE_URL`.","billing-payments":"# Billing & Payments\n\n# Billing & Payments\n\nThe Billing & Payments module handles the user-facing checkout flow, subscription plan selection, and payment session management. It currently implements a simulated payment provider to verify end-to-end billing wiring before integrating an external payment gateway (like Stripe or Razorpay).\n\n## Architecture & Execution Flow\n\nThe checkout process is entirely session-based. A user selects a plan, provides billing details, and creates a checkout session. The session is then completed (simulated as success or failure), and the user is redirected accordingly.\n\n```mermaid\ngraph TD\n    A[BillingCheckoutPage] -->|1. fetchBillingPlans| B(Backend API)\n    A -->|2. handleCheckout| C[createBillingCheckoutSession]\n    C --> D{Simulate Payment}\n    D -->|3a. SUCCEEDED| E[completeBillingCheckoutSession]\n    D -->|3b. FAILED| F[completeBillingCheckoutSession]\n    E --> G[BillingSuccessPage]\n    F --> H[BillingFailedPage]\n```\n\nAll backend communication in this module relies on `backendGet` and `backendPost` from `src/lib/backend-client.ts`. These utilities automatically intercept the request to attach the user's Firebase authentication token via `getCurrentIdToken()`.\n\n## Key Components\n\n### 1. Checkout Flow (`src/app/billing/checkout/page.tsx`)\nThe `BillingCheckoutPage` is the primary entry point for the module. It requires an authenticated user (enforced via the `useAuthUser` hook).\n\n**State Management:**\n*   **`plans`**: Populated on mount via `fetchBillingPlans()`.\n*   **`draft`**: A `BillingDraft` object tracking user inputs (name, email, address, discount code, and `BillingPaymentMethod`).\n*   **`session`**: Holds the `BillingCheckoutSessionSummary` once a checkout session is successfully created.\n\n**Key Functions:**\n*   `sanitizeInput(value, maxLength)`: Strips `<` and `>` characters and truncates strings to prevent basic injection before sending data to the backend.\n*   `handleCheckout()`: Validates the `draft` state, sanitizes all inputs, and calls `createBillingCheckoutSession()`. If successful, it transitions the UI to the payment simulation step.\n*   `handleComplete(status)`: Accepts `\"SUCCEEDED\"` or `\"FAILED\"`. It calls `completeBillingCheckoutSession()` to update the backend state, then routes the user to `/billing/success` or `/billing/failed` with the `sessionId` appended as a URL parameter.\n\n### 2. Status Pages (`src/app/billing/success/page.tsx` & `src/app/billing/failed/page.tsx`)\nBoth `BillingSuccessPage` and `BillingFailedPage` follow an identical architectural pattern:\n1.  Extract the `session` ID from the URL search parameters (`?session=...`).\n2.  Wait for the `useAuthUser` hook to confirm authentication.\n3.  Fetch the session details using `getBillingCheckoutSession(sessionId)`.\n4.  Display the session status, plan name, and total amount.\n\nThe success page provides a call-to-action to continue to the `/student/dashboard`, while the failure page allows the user to retry the checkout.\n\n### 3. API Client (`src/lib/billing-api.ts`)\nThis file defines the data contracts and API wrapper functions for the billing domain.\n\n**Core Data Models:**\n*   `BillingPlan`: Represents an available subscription (e.g., `starter`, `school_pro`, `enterprise`), including its `monthlyAmountInr` and `seatLimit`.\n*   `BillingCheckoutSessionSummary`: The central entity for the checkout process. It tracks the `status` (`CREATED`, `SUCCEEDED`, `FAILED`), financial calculations (`subtotalAmountInr`, `discountAmountInr`, `totalAmountInr`), and the `checkoutProvider` (currently hardcoded to `\"SIMULATED\"`).\n\n**API Methods:**\n*   `fetchBillingPlans()`: Retrieves available plans via `GET /api/billing/plans`.\n*   `createBillingCheckoutSession(payload)`: Initializes a new payment attempt via `POST /api/billing/checkout`.\n*   `getBillingCheckoutSession(sessionId)`: Fetches the status of an existing session via `GET /api/billing/checkout/{sessionId}`.\n*   `completeBillingCheckoutSession(sessionId, payload)`: Finalizes the simulated payment via `POST /api/billing/checkout/{sessionId}/complete`.\n\n## Security & Data Integrity\n\n*   **Authentication Requirement:** Every page in this module uses `useAuthUser()`. If `user` is null, API calls are bypassed, and the UI prompts the user to sign in.\n*   **Cross-Community Auth Flow:** When `createBillingCheckoutSession` or `completeBillingCheckoutSession` is invoked, the execution flow traverses through `backendPost` -> `backendRequest` -> `buildHeaders` -> `getCurrentIdToken`. This ensures that every billing action is cryptographically tied to the active Firebase session.\n*   **Input Sanitization:** The `sanitizeInput` function in the checkout page ensures that address lines, names, and discount codes are stripped of HTML tags and strictly length-bound before hitting the API client.","core-app-layout":"# Core App & Layout\n\n# Core App & Layout\n\nThe Core App & Layout module provides the foundational Next.js App Router configuration, global UI shells, and routing definitions for the Sankalp AEI platform. It establishes the global HTML structure, handles application-wide error and 404 states, and provides reusable layout components for role-specific dashboards (Student, Teacher, Parent).\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    RootLayout[RootLayout] --> ErrorBoundary[GlobalErrorPage]\n    RootLayout --> NotFound[NotFoundPage]\n    RootLayout --> Home[HomePage]\n    RootLayout --> RoleShell[RoleShell Component]\n    RoleShell --> DashboardPages[Role-Specific Dashboards]\n```\n\n## Routing Configuration (`src/app/routes.ts`)\n\nThe module centralizes route definitions to maintain a single source of truth for navigation, authentication requirements, and Role-Based Access Control (RBAC).\n\n*   **`AppRole`**: Defines the core user types: `\"STUDENT\" | \"TEACHER\" | \"PARENT\"`.\n*   **`appRoutes`**: An array of `AppRoute` objects. Each route specifies its `path`, `label`, `requireAuth` boolean, and an optional array of allowed `roles`.\n*   **`routeGroups`**: A pre-computed object that filters `appRoutes` into `student`, `teacher`, and `parent` arrays. This is highly useful for generating dynamic navigation menus in role-specific layouts.\n\n**Developer Note:** When adding a new page to the application, you must register it in `appRoutes` to ensure it appears in route coverage snapshots and is properly categorized for role-based navigation.\n\n## App Router Core\n\n### Root Layout (`src/app/layout.tsx`)\nThe `RootLayout` is the top-level wrapper for the entire application. \n*   Injects global CSS (`globals.css` which imports the design system).\n*   Configures and injects Next.js optimized fonts: **Inter** (mapped to `--font-sans`) and **Manrope** (mapped to `--font-headline`).\n*   Sets the global metadata (Title: \"Sankalp AEI\").\n\n### Error Handling (`src/app/error.tsx`)\n`GlobalErrorPage` is a `\"use client\"` boundary that catches unexpected runtime errors across the application.\n*   Displays a user-friendly fallback UI using the `Card` component.\n*   Provides actionable recovery paths: a `reset()` retry button, a link to the Plan Hub, and a support ticket link.\n*   **Dev-mode feature:** Conditionally renders the raw `error.message` in a `<pre>` block if `NODE_ENV !== \"production\"`.\n\n### Not Found (`src/app/not-found.tsx`)\n`NotFoundPage` handles 404 states. It provides a search input placeholder and a set of `quickLinks` (Plan Hub, Login, Onboarding, Help Center) to help users recover from dead links.\n\n### Landing Page (`src/app/page.tsx`)\n`HomePage` serves as the \"Plan Hub\" or execution hub. It dynamically renders:\n*   A grid of planned outputs (Student Flow, Teacher Flow, etc.).\n*   A \"Route Coverage Snapshot\" generated directly from the `appRoutes` registry.\n*   Evaluation criteria for the UI implementation.\n\n## Layout Components\n\n### `RoleShell` (`src/components/layout/RoleShell.tsx`)\n`RoleShell` is the primary layout wrapper for all authenticated, role-based pages. It enforces a consistent structural pattern across the app.\n\n**Key Props:**\n*   `title` / `subtitle` / `eyebrow`: Populates the hero block at the top of the dashboard.\n*   `navItems`: An array of `{ href, label }` objects for the top navigation bar.\n*   `activePath`: Used to highlight the current active route in the navigation.\n*   `actionLabel` / `actionHref`: Optional props to render a primary call-to-action button in the header (e.g., \"Create Intervention\").\n\n**Usage Example:**\n```tsx\n<RoleShell\n  title=\"Student Dashboard\"\n  subtitle=\"Track your mission progress.\"\n  navItems={[{ href: \"/student/dashboard\", label: \"Overview\" }]}\n  activePath=\"/student/dashboard\"\n>\n  {/* Dashboard content goes here */}\n<\/RoleShell>\n```\n\n### `DatabaseState` (`src/components/layout/DatabaseState.tsx`)\nA utility component used within dashboards to standardize the UI for asynchronous data fetching. \n*   Accepts `loading`, `error`, and `pathHint` props.\n*   Renders a loading `Card` when `loading` is true.\n*   Renders an error `Card` prompting the user to connect the database or add content when an `error` string is present.\n*   Returns `null` if data is successfully loaded, allowing the main content to render.","design-system-ui-components":"# Design System & UI Components\n\n# Design System & UI Components\n\nThe Design System module provides a cohesive set of reusable React components, styling utilities, and CSS variables. It implements a neumorphic (soft UI) design language, utilizing CSS variables for design tokens and a hybrid styling approach that combines global CSS utility classes with dynamic inline styles.\n\n## Architecture & Styling Approach\n\nThe design system relies on three core pillars:\n1. **CSS Variables (Tokens):** Defined in `design-system.css`, these control colors, spacing, typography, shadows, and transitions.\n2. **Utility Classes:** Global classes like `.nm-surface` and `.nm-inset` apply complex neumorphic box-shadows and gradients.\n3. **Dynamic Inline Styles:** Components use inline styles for variant-specific or state-driven visual changes, keeping the CSS bundle small and component logic co-located.\n\n### Class Merging (`cn.ts`)\nThe module uses a custom `cn` utility function that combines `clsx` (for conditional classes) and `tailwind-merge` (for resolving conflicting utility classes). This is heavily used in components like `Button`, `Card`, and `Input` to merge base classes with consumer-provided `className` props.\n\n## Component Library\n\nAll components are exported through the barrel file `src/components/design-system/index.ts`.\n\n### `Button`\nA highly interactive button component supporting multiple variants and sizes.\n* **Props:** Extends standard `HTMLButtonElement` attributes.\n* **Variants:** `primary`, `secondary` (default), `danger`, `ghost`. Handled internally by the `getVariantStyle` function.\n* **Sizes:** `sm`, `md` (default), `lg`. Maps to specific padding and font sizes via `sizeMap` and `fontMap`.\n* **States:** Supports a `loading` boolean which disables the button, reduces opacity, and renders an animated CSS spinner alongside the children.\n* **Layout:** Supports a `fullWidth` boolean.\n\n### `Card`\nA flexible container component for grouping content.\n* **Polymorphism:** Uses the `as` prop to render as an `article` (default), `section`, or `div`.\n* **Variants:** `surface` (default, uses `.nm-surface`), `soft` (uses `.nm-surface-soft`), and `inset` (uses `.nm-inset`).\n* **Content:** Optionally accepts `title` and `subtitle` props to automatically render a standardized header above the `children`.\n\n### `Input`\nA styled text input wrapper.\n* **Features:** Automatically links the `<label>` and `<input>` using the provided `id` or falling back to the `name` attribute.\n* **Props:** Accepts standard `InputHTMLAttributes` plus optional `label` and `hint` strings.\n* **Styling:** Uses the `.nm-inset` class for a recessed neumorphic appearance.\n\n### `Progress`\nA linear progress bar component.\n* **Props:** Requires `label` and `value`. Optionally accepts `hint` and `tone` (`primary`, `success`, `warning`).\n* **Logic:** The `value` is automatically constrained between 0 and 100 using an internal `clamp` function to prevent CSS layout breakage.\n* **Animation:** The progress fill uses a CSS transition (`var(--transition-slow)`) for smooth value updates.\n\n### `Badge`\nA small status indicator.\n* **Tones:** Accepts a `tone` prop (`primary`, `neutral`, `success`, `warning`, `error`) which maps to specific text and background color combinations via the `toneStyles` record.\n\n## Domain Integration & Tone Utilities\n\nTo keep domain logic out of the UI components, the module provides `src/lib/tone-utils.ts`. These utilities map application-specific states to standard `BadgeTone` values.\n\n```mermaid\ngraph TD\n    A[TeacherDashboardPage] -->|severity: low/medium/high| C(getSeverityTone)\n    B[TeacherInterventionsPage] -->|severity: low/medium/high| C\n    D[ParentInboxPage] -->|type: alert/report/achievement| E(getNotificationTone)\n    C -->|BadgeTone| F[Badge Component]\n    E -->|BadgeTone| F\n```\n\n* **`getSeverityTone(severity)`**: Converts risk/severity levels (`low`, `medium`, `high`, `critical`) into appropriate badge tones (e.g., `high` becomes `error`).\n* **`getNotificationTone(type)`**: Converts message types (`report`, `alert`, `achievement`) into badge tones (e.g., `achievement` becomes `success`).\n\n## Global CSS (`design-system.css`)\n\nThe global stylesheet establishes the foundation for the application's UI:\n\n* **Design Tokens:** Defines `--color-*`, `--space-*`, `--font-size-*`, `--radius-*`, and `--shadow-*` variables on the `:root`.\n* **Neumorphic Utilities:** \n  * `.nm-surface`: Extruded surface (standard cards).\n  * `.nm-surface-soft`: Softer extruded surface with a gradient background.\n  * `.nm-inset`: Recessed surface (inputs, progress bar tracks).\n* **Layout Utilities:** Provides grid classes (`.dashboard-grid`, `.card-grid-3`, `.card-grid-2`) and responsive breakpoints that adjust spacing and typography variables for tablet (`max-width: 768px`) and mobile (`max-width: 480px`).\n* **Animations:** Includes a `.reveal-up` keyframe animation with staggered delay utilities (`.reveal-delay-1`, etc.) for mounting sequences.","other":"# Other\n\n# Project Configuration & Architecture\n\nThis module encompasses the core configuration, deployment settings, routing architecture, and database integration patterns for the Sankalp frontend. It defines how the Next.js application is built, deployed to Firebase App Hosting, and how it interacts with Firestore for role-based content delivery.\n\n## Tech Stack & Configuration\n\nThe project is built on a modern React ecosystem, configured via standard tooling files:\n\n*   **Core**: Next.js 15.0.0, React 19.0.0.\n*   **State & Forms**: Zustand for global state, React Hook Form with Zod for schema validation.\n*   **Styling & UI**: Tailwind CSS, Framer Motion, `class-variance-authority`, `clsx`, and `tailwind-merge`.\n*   **Next.js Config (`next.config.js`)**: React strict mode is enabled, and image optimization is disabled (`unoptimized: true`).\n*   **TypeScript (`tsconfig.json`)**: Strict mode enabled with path aliases configured for clean imports (e.g., `@/components/*`, `@/lib/*`).\n*   **Tailwind (`tailwind.config.ts`)**: The theme is tokenized using CSS variables (e.g., `var(--color-primary)`, `var(--color-accent)`) to support the application's light neumorphic design system.\n\n## Deployment: Firebase App Hosting\n\nThe application is configured for deployment on Firebase App Hosting, running on Cloud Run.\n\n### App Hosting Configuration\n*   **`apphosting.yaml`**: Configures the Cloud Run environment (0-3 instances, 1 CPU, 512MiB memory) and maps required environment variables for both `BUILD` and `RUNTIME` availability.\n*   **`firebase.json`**: Defines the App Hosting backend ID (`aeisankalp`) and specifies ignored directories during deployment.\n\n### Environment Variables\nThe application requires a standard set of Firebase configuration variables, alongside role-specific defaults and API URLs:\n*   `NEXT_PUBLIC_FIREBASE_API_KEY` through `NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID`\n*   `NEXT_PUBLIC_API_BASE_URL` (Points to the deployed backend, e.g., Cloud Run URL)\n*   `NEXT_PUBLIC_STUDENT_ID`, `NEXT_PUBLIC_TEACHER_ID`, `NEXT_PUBLIC_PARENT_ID` (Used for Firestore document resolution)\n\n## Routing & Access Control\n\nAccess control is enforced via Next.js middleware using session cookies, combined with Firebase Authentication.\n\n### Authentication Flow\n1.  Users authenticate via Firebase Email/Password in `/login` or `/auth/signup`.\n2.  Roles are resolved via Firebase Custom Claims (`role`). If missing, the system falls back to the role selected in the UI.\n    *   *Dev Note*: Set claims manually via `npm run auth:set-claims -- <firebase_uid> <STUDENT|TEACHER|PARENT>`.\n3.  Session cookies (`aei-auth`, `aei-role`) are set.\n4.  Backend API calls (via `src/lib/backend-client.ts`) automatically attach the Firebase ID token as a Bearer token.\n\n### Middleware Enforcement\n*   **Unauthenticated**: Redirected to `/login` when attempting to access protected routes.\n*   **Authenticated**: Redirected to their respective role dashboard if they attempt to access `/login`, `/auth/signup`, or `/auth/forgot-password`.\n*   **Role Mismatch**: Redirected to their correct role's home page if they attempt to access another role's route.\n\n```mermaid\ngraph TD\n    A[Incoming Request] --> B{Has aei-auth cookie?}\n    B -- No --> C{Is Protected Route?}\n    C -- Yes --> D[Redirect to /login]\n    C -- No --> E[Allow Access]\n    B -- Yes --> F{Is Auth Route?}\n    F -- Yes --> G[Redirect to Role Dashboard]\n    F -- No --> H{Matches aei-role?}\n    H -- Yes --> I[Allow Access]\n    H -- No --> J[Redirect to Correct Role Dashboard]\n```\n\n## Database Integration (Firestore)\n\nThe frontend relies heavily on direct client-side Firestore reads for page content, rather than fetching HTML or structured data from a backend REST API. \n\n### Document Paths\nContent is scoped by role and user ID (defaulting to the `NEXT_PUBLIC_*_ID` env vars):\n*   **Student**: `students/{studentId}/pages/{pageKey}` (e.g., `dashboard`, `insights`, `curriculum`, `assessments`, `ai-companion`)\n*   **Teacher**: `teachers/{teacherId}/pages/{pageKey}` (e.g., `dashboard`, `interventions`)\n*   **Parent**: `parents/{parentId}/pages/{pageKey}` (e.g., `dashboard`, `inbox`)\n*   **Settings**: `users/{uid}/settings/profile` and `users/{uid}/settings/preferences`\n*   **Support**: `support_tickets` (filtered by `uid`)\n\n### Fallback & Seeding\n*   **`DatabaseState` Component**: If a required Firestore document is missing, the page renders a fallback UI displaying the exact missing document path.\n*   **Seed Helpers**: Development utilities exist to populate these documents:\n    *   `seedStudentPages(\"default-student\")`\n    *   `seedTeacherPages(\"default-teacher\")`\n    *   `seedParentPages(\"default-parent\")`\n\n## Shared UI Architecture\n\nTo maintain consistency across the 22+ routes, the application utilizes a shared component system:\n\n*   **`RoleShell`**: A unified layout wrapper used across all role pages. It handles the top navigation, active state highlighting, hero section (title, subtitle, eyebrow), and optional hero action buttons.\n*   **Design System Primitives**: Reusable components (`Button`, `Card`, `Input`, `Badge`, `Progress`) are strictly typed and styled using the central tokenized theme in `src/styles/design-system.css`.\n*   **Tone Utilities**: `src/lib/tone-utils.ts` centralizes tone mapping logic to ensure consistent visual hierarchy (e.g., mapping severity levels to specific colors/badges).","overview":"# sankalp-frontend — Wiki\n\n# Sankalp Frontend\n\nWelcome to the Sankalp frontend repository! Sankalp is a modern Student Learning Analytics & Parent Engagement Platform. This Next.js application serves as the primary interface for students, educators, and parents to interact with educational data, track learning progress, and manage their accounts in real time.\n\n## Architecture Overview\n\nThe application is built on a modern React ecosystem utilizing Next.js 15, React 19, and Firebase. It relies heavily on real-time data synchronization via Firestore and a secure, Role-Based Access Control (RBAC) system. \n\nTo keep the architecture scalable, the frontend is divided into role-specific portals that share underlying infrastructure, authentication, and design systems.\n\n```mermaid\ngraph TD\n    Client[Web Client] --> Core[Core App & Layout]\n    Core --> Auth[Authentication & Authorization]\n    Core --> Portals[Role Portals]\n    Portals --> UI[Design System & UI Components]\n    Portals --> Backend[Backend & Infrastructure]\n    Auth --> Firebase[(Firebase Auth)]\n    Backend --> API[External APIs & Firestore]\n    \n    classDef default fill:#f9f9f9,stroke:#333,stroke-width:1px;\n    classDef db fill:#e1f5fe,stroke:#0288d1,stroke-width:1px;\n    class Firebase,API db;\n```\n\n## Core Workflows & Modules\n\nThe entry point to the application is managed by the [Core App & Layout](core-app-layout.md) module, which sets up the Next.js App Router, global error boundaries, and role-specific UI shells. \n\n### Identity & Access\nSecurity and user identity are handled by the [Authentication & Authorization](authentication-authorization.md) module. It bridges client-side Firebase authentication with Next.js server-side middleware to protect routes. When a new user signs up, they are routed through the [User Settings & Onboarding](user-settings-onboarding.md) flow to select their role (Student, Teacher, or Parent) and configure their application preferences.\n\n### Role-Specific Portals\nThe core user experience is heavily tailored to the user's role:\n*   The [Student Portal](student-portal.md) provides a real-time, database-backed interface featuring dashboards, curriculum tracking, and AI-driven insights. It subscribes directly to Firestore documents to update the UI instantly as new data is processed.\n*   The [Teacher & Parent Portals](teacher-parent-portals.md) utilize a Server-Driven UI (SDUI) approach. Instead of hardcoding layouts, page structures and metrics are streamed directly from Firestore, allowing dynamic updates to the educator and guardian experiences without frontend deployments.\n\n### Supporting Systems\nUsers can manage their subscription plans through the [Billing & Payments](billing-payments.md) module. Under the hood, this checkout flow relies heavily on the [Backend & Infrastructure](backend-infrastructure.md) module to securely attach Firebase ID tokens to backend requests and manage session states. If users encounter issues, they can access the searchable knowledge base and authenticated ticketing system within the [Support & Help](support-help.md) module.\n\nEverything is visually tied together by our [Design System & UI Components](design-system-ui-components.md), which implements a neumorphic (soft UI) design language using CSS variables and reusable React components.\n\n## Getting Started\n\nThe project is configured with standard modern tooling, utilizing Zustand for global state and React Hook Form with Zod for schema validation.\n\n### Local Development\n\n1. **Install Dependencies:** Ensure you are using the correct Node version and install the project dependencies.\n   ```bash\n   npm install\n   ```\n2. **Start the Development Server:**\n   ```bash\n   npm run dev\n   ```\n   The application will be available at `http://localhost:3000`.\n\n### Available Scripts\n\n*   `npm run dev` - Starts the local development server.\n*   `npm run build` - Builds the Next.js application for production deployment (optimized for Firebase App Hosting).\n*   `npm run start` - Starts the production server locally.\n*   `npm run lint` - Runs ESLint to check for code quality issues.\n*   `npm run type-check` - Validates TypeScript typings across the project.\n*   `npm run test` - Runs the test suite.\n*   `npm run test:watch` - Runs the test suite in interactive watch mode.","student-portal":"# Student Portal\n\n# Student Portal Module\n\nThe Student Portal module provides a real-time, database-backed interface for students to interact with their educational data. It consists of five primary views (Dashboard, Insights, Curriculum, Assessments, and AI Companion) that all share a common data-fetching architecture powered by Firebase Firestore.\n\n## Architecture & Data Flow\n\nThe module is designed around a real-time subscription model. Instead of fetching data once on load, pages subscribe to specific Firestore documents. When the database updates (e.g., an AI agent processes a new insight or a teacher updates a curriculum), the student UI updates instantly.\n\n```mermaid\ngraph TD\n    UI[Student Pages] --> Hook[useStudentPageContent]\n    Hook --> Sub[subscribeToStudentPage]\n    Sub --> Firestore[(Firestore: students/id/pages/key)]\n    Seed[seedStudentPages] -.->|Populates| Firestore\n```\n\n## Core Views\n\nAll student pages are located in `src/app/student/` and share a consistent layout structure using the `RoleShell` and `DatabaseState` components. \n\n*   **Dashboard (`/student/dashboard`)**: Displays the student's current mission, live focus/retention signals, subject mastery progress, and recommended next steps. Uses `StudentDashboardDoc`.\n*   **Insights (`/student/insights`)**: Provides a synthesized view of the student's learning trajectory, highlighting mastery trends, subject breakdowns, and AI-generated narratives. Uses `StudentInsightsDoc`.\n*   **Curriculum (`/student/curriculum`)**: Shows the current learning block, upcoming schedule, dependency risks (concepts blocking future progress), and Oracle insights for schedule adjustments. Uses `StudentCurriculumDoc`.\n*   **Assessments (`/student/assessments`)**: An active assessment interface featuring the current question, confidence scoring, upcoming assessment schedules, and historical results. Uses `StudentAssessmentsDoc`.\n*   **AI Companion (`/student/ai-companion`)**: A conversational interface providing adaptive support. It includes quick prompts, a message stream, and live context metrics (e.g., confidence, error patterns). Uses `StudentAiCompanionDoc`.\n\n## Data Management\n\n### The `useStudentPageContent` Hook\n\nThe primary way pages interact with data is through the `useStudentPageContent` hook (`src/hooks/useStudentPageContent.ts`). \n\n```typescript\nconst { data, loading, error, studentId } = useStudentPageContent<StudentDashboardDoc>(\"dashboard\");\n```\n\n**Key Behaviors:**\n1.  **Student ID Resolution**: It reads the student ID from the `NEXT_PUBLIC_STUDENT_ID` environment variable, falling back to `\"default-student\"`.\n2.  **Real-time Subscription**: It calls `subscribeToStudentPage` to establish an `onSnapshot` listener to Firestore.\n3.  **State Management**: It manages `loading`, `error`, and `data` states, which are passed directly to the `DatabaseState` component to handle UI fallbacks while data is loading or if the document is missing.\n\n### Database Subscription\n\nThe `subscribeToStudentPage` function (`src/lib/student-content-db.ts`) handles the actual Firebase interaction. It listens to the document path generated by `getStudentPagePath` (`students/{studentId}/pages/{pageKey}`). If Firebase is not configured, it safely returns an error state rather than crashing the application.\n\n## Data Models\n\nAll page data models are defined in `src/lib/student-content.ts`. They share a common base interface for shell configuration:\n\n```typescript\nexport interface StudentPageMeta {\n  brandLabel: string;\n  navItems: StudentNavItem[];\n  hero: {\n    eyebrow: string;\n    title: string;\n    subtitle: string;\n    actionLabel?: string;\n    actionHref?: string;\n  };\n}\n```\n\nEach page extends this with its specific content requirements (e.g., `StudentCurriculumDoc` adds `currentBlock`, `schedule`, `dependencyRisks`, and `oracleInsights`).\n\n## Seeding the Database\n\nBecause the UI is entirely database-driven, the module includes a seeding utility to populate Firestore with initial state.\n\n*   **`src/lib/student-seed-data.ts`**: Contains the hardcoded `studentSeedPages` object, which holds complete, typed mock data for all five pages.\n*   **`src/lib/seed-student-pages.ts`**: Exports the `seedStudentPages(studentId)` function. This iterates over the seed data and writes it to Firestore using `setDoc` with `{ merge: true }`. \n\n*Note: To view the student portal locally, you must ensure your Firebase environment variables are set and the database has been seeded for the active `NEXT_PUBLIC_STUDENT_ID`.*","support-help":"# Support & Help\n\n# Support & Help Module\n\nThe Support & Help module provides users with a searchable knowledge base and an authenticated ticketing system to report issues, request assistance, and track the status of their inquiries. It integrates directly with Firebase Firestore for real-time ticket tracking.\n\n## Architecture & Data Flow\n\nThe module is split into a public-facing Help Center and an authenticated Support Ticket workspace. The ticketing system relies on a real-time Firestore subscription to keep the user's ticket list up to date without manual refreshing.\n\n```mermaid\ngraph TD\n    A[SupportTicketPage] -->|useAuthUser| B(Auth State)\n    A -->|handleCreateTicket| C[createSupportTicket]\n    A -->|useEffect| D[subscribeToSupportTickets]\n    C -->|addDoc| E[(Firestore: support_tickets)]\n    D -->|onSnapshot| E\n```\n\n## Key Components\n\n### Help Center (`src/app/help/page.tsx`)\nThe `HelpPage` component serves as the entry point for user support. \n* **Knowledge Base**: Currently utilizes a static array of `articles` covering various categories (Student, Teacher, Parent, Platform, Billing).\n* **Search Functionality**: Implements a client-side search using `useMemo`. It filters the `articles` array by checking if the search `query` exists within a concatenated string of the article's category, title, and excerpt.\n* **Navigation**: Provides direct links to the Support Ticket workspace (`/support/ticket`).\n\n### Support Ticket Workspace (`src/app/support/ticket/page.tsx`)\nThe `SupportTicketPage` is an authenticated dashboard where users can submit and track support requests.\n\n* **Authentication**: Uses the `useAuthUser` hook to ensure only logged-in users can create or view tickets. If unauthenticated, the page delegates loading/error states to the `DatabaseState` component.\n* **Ticket Creation**: \n  * Maintains a `TicketDraft` state for the form (Subject, Category, Priority, Description).\n  * Triggers `handleCreateTicket` on submission, which validates the presence of the user and required fields.\n  * Applies `sanitizeText` to the subject (max 120 chars) and message (max 1600 chars). This function strips `<` and `>` characters to prevent basic injection before sending data to the database.\n* **Real-time Tracking**: \n  * Uses a `useEffect` hook to call `subscribeToSupportTickets` when the user is authenticated.\n  * Renders a list of tickets, utilizing `formatTimestamp` to safely convert Firestore timestamp seconds into a localized date string.\n\n## Database Layer (`src/lib/support-ticket-db.ts`)\n\nThe database module handles all interactions with the `support_tickets` Firestore collection. It includes a safety check (`ensureDatabase`) to verify Firebase configuration before executing write operations.\n\n### Data Models\n\n```typescript\ntype SupportPriority = \"LOW\" | \"MEDIUM\" | \"HIGH\";\ntype SupportCategory = \"TECHNICAL\" | \"BILLING\" | \"ACADEMIC\" | \"ACCESS\";\n\ninterface SupportTicket {\n  id: string;\n  uid: string;\n  email: string;\n  subject: string;\n  message: string;\n  priority: SupportPriority;\n  category: SupportCategory;\n  status: \"OPEN\" | \"IN_PROGRESS\" | \"RESOLVED\";\n  createdAt?: { seconds: number; nanoseconds: number };\n}\n```\n\n### API Functions\n\n* **`createSupportTicket(uid, email, payload)`**\n  Writes a new document to the `support_tickets` collection. It automatically appends the user's `uid` and `email`, sets the initial `status` to `\"OPEN\"`, and uses Firestore's `serverTimestamp()` for the `createdAt` field.\n\n* **`subscribeToSupportTickets(uid, onData, onError)`**\n  Establishes an `onSnapshot` listener for documents in `support_tickets` where the `uid` matches the provided user ID. \n  * **Sorting Behavior**: Note that sorting is handled *client-side* within the snapshot callback rather than via a Firestore `orderBy` query. It sorts the mapped documents descending by `createdAt.seconds`.\n  * Returns an unsubscribe function that is used by `SupportTicketPage` to clean up the listener on component unmount.","teacher-parent-portals":"# Teacher & Parent Portals\n\n# Teacher & Parent Portals\n\nThe Teacher & Parent Portals module provides role-specific, real-time interfaces for educators and guardians. Instead of hardcoding page content, this module uses a Server-Driven UI (SDUI) approach where page structures, metrics, and notifications are streamed directly from Firestore documents.\n\n## Architecture & Data Flow\n\nThe module follows a strict unidirectional data flow from Firestore to the React components, utilizing Firebase's `onSnapshot` for real-time updates.\n\n```mermaid\ngraph TD\n    A[Page Component] -->|pageKey| B[useRolePageContent]\n    B -->|entityId, pageKey| C[role-content-db]\n    C -->|onSnapshot| D[(Firestore)]\n    D -.->|Real-time Updates| A\n```\n\n1. **Page Components** request data for a specific `pageKey` (e.g., `\"dashboard\"`).\n2. **Hooks** (`useTeacherPageContent` / `useParentPageContent`) resolve the current user's ID from environment variables and manage loading/error states.\n3. **Database Layer** (`subscribeToPage`) establishes a WebSocket connection to the specific Firestore document.\n4. **UI Rendering** uses shared layout components (`RoleShell`, `DatabaseState`) to display the streamed data.\n\n## Key Components\n\n### UI Pages\n\nPages are thin wrappers that pass a `pageKey` to the data hooks and map the returned JSON document to design system components (`Card`, `Badge`, `Progress`).\n\n**Teacher Portal (`src/app/teacher/`)**\n*   `TeacherDashboardPage`: Displays class performance snapshots, at-risk learners, recommended actions, and live notices. Integrates `getSeverityTone` to color-code risk levels.\n*   `TeacherInterventionsPage`: Acts as a command center for active student interventions. Displays an active queue, execution protocols, and a daily timeline.\n\n**Parent Portal (`src/app/parent/`)**\n*   `ParentDashboardPage`: Shows a high-level snapshot of a child's progress, weekly trend graphs, and recent notifications.\n*   `ParentInboxPage`: A dedicated view for reading detailed reports, alerts, and achievements. Integrates `getNotificationTone` for visual categorization.\n\n### Data Hooks\n\nLocated in `src/hooks/useRolePageContent.ts`, these hooks abstract the Firebase subscription logic and provide a clean interface for the UI:\n*   `useTeacherPageContent<T>(pageKey)`\n*   `useParentPageContent<T>(pageKey)`\n\n*Note: Currently, these hooks resolve the active user ID via `NEXT_PUBLIC_TEACHER_ID` and `NEXT_PUBLIC_PARENT_ID` (falling back to `\"default-teacher\"` and `\"default-parent\"`).*\n\n### Database Subscriptions\n\nThe `src/lib/role-content-db.ts` file handles the actual Firebase interactions. The core function is `subscribeToPage`, which listens to documents at the following paths:\n*   Teachers: `teachers/{teacherId}/pages/{pageKey}`\n*   Parents: `parents/{parentId}/pages/{pageKey}`\n\nHelper functions `getTeacherPagePath` and `getParentPagePath` (in `src/lib/role-content.ts`) are used to generate path hints for the UI's loading/error states.\n\n## Data Models\n\nAll page content is strictly typed in `src/lib/role-content.ts`. Every page document extends `RolePageMeta`, which defines the standard shell configuration:\n\n```typescript\nexport interface RolePageMeta {\n  brandLabel: string;\n  navItems: RoleNavItem[];\n  hero: {\n    eyebrow: string;\n    title: string;\n    subtitle: string;\n    actionLabel?: string;\n    actionHref?: string;\n  };\n}\n```\n\nSpecific page interfaces (e.g., `TeacherDashboardDoc`, `ParentInboxDoc`) extend this base interface to define the exact arrays and objects expected by the page's specific cards and lists.\n\n## Development & Seeding\n\nBecause the UI relies entirely on database documents, the module includes a robust seeding mechanism to populate Firestore with realistic mock data.\n\n*   **Seed Data (`src/lib/role-seed-data.ts`)**: Contains the raw JSON objects for `teacherSeedPages` and `parentSeedPages`. This data includes realistic scenarios like \"Declining confidence in 3 sessions\" or \"Focus streak: 14 days\".\n*   **Seed Scripts (`src/lib/seed-role-pages.ts`)**: Exposes `seedTeacherPages(teacherId)` and `seedParentPages(parentId)`. These functions iterate over the seed data and use Firebase's `setDoc` with `{ merge: true }` to write the documents to the correct paths without overwriting unrelated fields.","user-settings-onboarding":"# User Settings & Onboarding\n\n# User Settings & Onboarding\n\nThe User Settings & Onboarding module handles the initial user role selection and the management of user-specific configurations. It provides interfaces for users to define their application role (Student, Teacher, Parent), update their personal profile, and customize their application preferences (accessibility, notifications, and theming). \n\nThe module is split into client-side React components and a dedicated Firebase Firestore data layer.\n\n## Architecture & Data Flow\n\n```mermaid\ngraph TD\n    A[OnboardingPage] -->|setRoleSession| B(Auth Client)\n    C[ProfileSettingsPage] -->|load/save| E[user-settings-db]\n    D[PreferenceSettingsPage] -->|load/save| E\n    E -->|ensureDatabase| E\n    E -->|setDoc merge: true| F[(Firestore)]\n    C -->|updateProfile| G(Firebase Auth)\n```\n\n## Key Components\n\n### 1. Onboarding (`src/app/onboarding/page.tsx`)\nThe `OnboardingPage` component is responsible for routing newly authenticated users to their appropriate dashboard based on their role. \n\n*   **Execution Flow:** When a user selects a role card, the `handleContinue` function is triggered. This function calls `setRoleSession(role)` (imported from `@/lib/auth-client`) to persist the role selection via cookies, and then uses the Next.js router to push the user to the corresponding target path (`/student/dashboard`, `/teacher/dashboard`, or `/parent/dashboard`).\n*   **Roles Supported:** `STUDENT`, `TEACHER`, and `PARENT`.\n\n### 2. Profile Settings (`src/app/settings/profile/page.tsx`)\nThe `ProfileSettingsPage` allows users to manage their identity, contact information, and privacy controls.\n\n*   **Data Loading:** On mount, it uses the `useAuthUser` hook to get the current user. It then calls `loadUserProfileSettings(user.uid)` to fetch existing data. If no data exists, it falls back to `getProfileDefaults()`.\n*   **Sanitization:** Phone numbers are sanitized on input and before saving using the internal `sanitizePhone` function, which strips all characters except `+`, digits, spaces, parentheses, and hyphens, capping the length at 24 characters.\n*   **Saving:** The `handleSave` function constructs a `UserProfileSettings` payload. It calls `saveUserProfileSettings` to persist the data to Firestore. Additionally, if the user's `fullName` has changed, it synchronizes this change with Firebase Authentication by calling `updateProfile(user, { displayName: payload.fullName })`.\n\n### 3. Preference Settings (`src/app/settings/preferences/page.tsx`)\nThe `PreferenceSettingsPage` manages personalized learning goals, notification frequencies, and accessibility controls.\n\n*   **Data Loading:** Similar to the profile page, it waits for `useAuthUser` and then calls `loadUserPreferenceSettings(user.uid)`, falling back to `getPreferenceDefaults()` if necessary.\n*   **Saving:** The `handleSave` function trims text inputs (like `learningGoal`, `language`, and `timezone`) to specific character limits before calling `saveUserPreferenceSettings`.\n\n## Data Layer (`src/lib/user-settings-db.ts`)\n\nThe data layer abstracts all Firestore interactions for user settings, ensuring consistent paths and safe writes.\n\n### Database Paths\nSettings are stored in subcollections under the user's main document:\n*   Profile: `users/{uid}/settings/profile`\n*   Preferences: `users/{uid}/settings/preferences`\n\n### Core Functions\n*   **`ensureDatabase()`**: An internal guard function called before any read/write operation. It verifies that `isFirebaseConfigured` is true and the `db` instance exists, throwing an error otherwise.\n*   **`loadUserProfileSettings(uid)` / `loadUserPreferenceSettings(uid)`**: Fetches the respective document. If the `snapshot.exists()` check fails, it returns the default objects (`getProfileDefaults()` or `getPreferenceDefaults()`).\n*   **`saveUserProfileSettings(uid, payload)` / `saveUserPreferenceSettings(uid, payload)`**: Writes the payload to Firestore using `setDoc` with the `{ merge: true }` option. This ensures that updates are non-destructive to other fields in the document. It also automatically appends an `updatedAt: serverTimestamp()` field to track modification times.\n\n### Data Models\n\n```typescript\nexport interface UserProfileSettings {\n  fullName: string;\n  phone: string;\n  timezone: string;\n  notificationsEnabled: boolean;\n  privacyMode: \"standard\" | \"high\";\n}\n\nexport interface UserPreferenceSettings {\n  learningGoal: string;\n  notificationFrequency: \"immediate\" | \"daily\" | \"weekly\";\n  language: string;\n  theme: \"system\" | \"light\" | \"dark\";\n  timezone: string;\n  largeText: boolean;\n  highContrast: boolean;\n}\n```\n\n## Performance & Security Considerations\n\n*   **Merge Writes:** All database saves use `{ merge: true }`. This allows for small, targeted payloads, reducing network overhead and preventing accidental data overwrites if the schema expands in the future.\n*   **Client-Side Truncation:** Text inputs are aggressively trimmed and sliced (e.g., `learningGoal.trim().slice(0, 160)`) before being sent to Firestore to prevent excessively large documents.\n*   **Auth Dependency:** Both settings pages strictly require an authenticated user via `useAuthUser`. If `user` is null, the save functions will abort and display an error, preventing unauthenticated database write attempts."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
